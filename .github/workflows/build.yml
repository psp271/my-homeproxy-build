name: Build HomeProxy

on:
  workflow_dispatch:

jobs:
  build:
    # 降低到 ubuntu-22.04 以获得更好的兼容性，避免 distutils 缺失问题
    runs-on: ubuntu-22.04 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev

      - name: Build with SDK
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: x86_64 # 请确保这是你的目标架构
          FEEDNAME: custom
          PACKAGES: luci-app-homeproxy
          CUSTOM_FEEDS: |
            src-git homeproxy https://github.com/immortalwrt/homeproxy.git
            src-git packages https://github.com/immortalwrt/packages.git
            src-git luci https://github.com/immortalwrt/luci.git

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: homeproxy-packages
          path: bin/packages/*/custom/*.ipk
