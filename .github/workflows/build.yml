name: Build HomeProxy IPK

on:
  workflow_dispatch: # 手动触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build IPK
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: x86_64 # 改为你的路由器架构，如 aarch64_generic
          FEEDNAME: custom
          PACKAGES: luci-app-homeproxy
          # 指向 HomeProxy 源码路径
          CUSTOM_FEEDS: |
            src-git homeproxy https://github.com/immortalwrt/homeproxy.git

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: homeproxy-ipks
          path: bin/packages/*/custom/*.ipk
