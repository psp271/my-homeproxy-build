name: Build HomeProxy for OpenWrt 24.10.5 (x86_64)

on:
  workflow_dispatch:
  push:
    branches:
      - main

# 全局环境变量，解决 Node.js 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 此时 v4 已经支持在 Node 24 下运行

      - name: Cleanup Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig \
            libpython3-dev python3-setuptools golang-go
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: Setup SDK (OpenWrt 24.10.5)
        run: |
          wget https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          tar -xJf *.tar.xz
          mv openwrt-sdk-* sdk

      - name: Update & Install Feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add HomeProxy Source
        run: |
          cd sdk
          git clone https://github.com/immortalwrt/homeproxy.git package/homeproxy
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 24.10 编译必须确保 golang 够新
          ./scripts/feeds install -p packages golang

      - name: Compile HomeProxy
        run: |
          cd sdk
          make defconfig
          # 修改配置为编译独立 IPK (m)
          sed -i 's/CONFIG_PACKAGE_homeproxy=y/CONFIG_PACKAGE_homeproxy=m/' .config
          
          # 下载源码并开始编译
          make package/homeproxy/download V=s
          make package/homeproxy/compile -j$(nproc) V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HomeProxy-24.10.5-x86_64
          path: |
            sdk/bin/packages/x86_64/base/homeproxy*.ipk
            sdk/bin/packages/x86_64/packages/sing-box*.ipk
